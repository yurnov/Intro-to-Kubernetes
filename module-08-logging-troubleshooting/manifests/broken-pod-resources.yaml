# broken-pod-resources.yaml — Pod with unreasonably low resource limits
# Used in Lab 8 to practice troubleshooting resource-related issues.
# The CPU limit of 1m (1 millicore) is far too low for nginx to start properly.
# The memory limit of 4Mi is also extremely low and will likely cause OOMKill.

apiVersion: v1
kind: Pod
metadata:
  name: broken-resources
  namespace: training
  labels:
    app: broken-resources
    exercise: troubleshooting     # Identifies this as a troubleshooting exercise
    module: "08"
spec:
  containers:
  - name: web
    image: nginx:1.30.0
    ports:
    - containerPort: 80
    resources:
      requests:
        memory: "4Mi"             # ❌ BUG: Extremely low memory request
        cpu: "1m"                 # ❌ BUG: Only 1 millicore — far too low
      limits:
        memory: "4Mi"             # ❌ BUG: 4Mi is not enough for nginx
        cpu: "1m"                 # ❌ BUG: 1 millicore will cause extreme throttling

# Fix: Increase resource limits to reasonable values:
#   requests: memory: "64Mi", cpu: "50m"
#   limits: memory: "128Mi", cpu: "100m"
# Diagnosis: kubectl describe pod broken-resources -n training
#   → Check Last State for OOMKilled or look for CrashLoopBackOff
#   → kubectl logs broken-resources -n training --previous
