# serviceaccount.yaml — ServiceAccount for the 'developer' identity
# Used in Lab 6 to demonstrate RBAC by giving a Pod a specific identity.
# The ServiceAccount is bound to Roles/ClusterRoles via RoleBindings.
#
# By default, Kubernetes creates a 'default' ServiceAccount in every namespace.
# Creating a custom ServiceAccount allows fine-grained access control.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: developer                    # Custom SA name — used as an identity for Pods
  namespace: training
  labels:
    app: rbac-lab                    # Label for easy identification
automountServiceAccountToken: true   # Mount the API token into Pods using this SA
