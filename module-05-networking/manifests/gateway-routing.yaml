# gateway-routing.yaml — Gateway API resources for path-based routing
# Used in Lab 5 with Envoy Gateway v1.5.9 (bundles Gateway API v1.x CRDs).
#
# Apply after:
# 1. Envoy Gateway is installed in the envoy-gateway-system namespace
#    (the Helm chart installs the Gateway API CRDs + the controller, but it
#     does NOT create a GatewayClass — so this file creates one below).

# A GatewayClass is the cluster-scoped "template" that ties a Gateway to a
# controller. Envoy Gateway only reconciles Gateways whose GatewayClass has a
# controllerName matching its own. Without this resource the controller logs
# "no accepted gatewayclass" and the Gateway never gets programmed (no Envoy
# data-plane Pod/Service is ever created).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: training-gateway
  namespace: envoy-gateway-system
spec:
  gatewayClassName: envoy-gateway
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web-app-routing
  namespace: training
spec:
  parentRefs:
  - name: training-gateway
    namespace: envoy-gateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /app-a
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: web-app-a
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /app-b
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: web-app-b
      namespace: app-b
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-training-routes
  namespace: app-b
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: training
  to:
  - group: ""
    kind: Service
