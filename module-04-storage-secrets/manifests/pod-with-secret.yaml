# pod-with-secret.yaml — Pod that mounts a Secret as a volume
# Demonstrates the recommended approach for consuming Secrets:
# mounting them as files rather than using environment variables.

apiVersion: v1
kind: Pod
metadata:
  name: secret-reader
  namespace: training
  labels:
    app: secret-reader
    module: "04"
spec:
  containers:
  - name: reader
    image: busybox:1.37.0
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "=== Secret mounted as files ==="
        echo "Username: $(cat /etc/db-credentials/username)"
        echo "Password file exists: $(test -f /etc/db-credentials/password && echo yes || echo no)"
        echo ""
        echo "=== File permissions ==="
        ls -la /etc/db-credentials/
        echo ""
        echo "=== Sleeping to allow inspection ==="
        sleep 3600
    volumeMounts:
    - name: secret-volume
      mountPath: /etc/db-credentials   # Each Secret key becomes a file here
      readOnly: true                   # Best practice: mount Secrets as read-only
    resources:
      requests:
        cpu: "50m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "64Mi"

  volumes:
  - name: secret-volume
    secret:
      secretName: db-credentials       # References the Secret from db-secret.yaml
      defaultMode: 0400               # File permissions: owner read-only (secure)

# Key points:
# 1. Secrets mounted as volumes appear as files (one file per key)
# 2. Volume-mounted Secrets are automatically updated when the Secret changes
# 3. defaultMode 0400 = read-only for file owner — more secure than default 0644
# 4. Prefer volume mounts over env vars: env vars are visible in process listings
#    and may be logged or leaked through error messages
