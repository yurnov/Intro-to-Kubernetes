# db-secret.yaml — Secret with database credentials
# Stores sensitive data (username and password) for the PostgreSQL database.
# Values are base64-encoded (NOT encrypted!) for transport in YAML.

apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: training
  labels:
    app: postgres
    module: "04"
type: Opaque                    # Generic secret type for arbitrary key-value pairs
stringData:                     # stringData accepts plain text (auto-encoded to base64)
  username: "trainuser"
  password: "Kub3rn3t3s-Tr@ining!"

# Key points:
# 1. 'stringData' is a convenience field — Kubernetes auto-converts to base64
# 2. Alternatively, use 'data' with pre-encoded base64 values:
#    data:
#      username: dHJhaW51c2Vy
#      password: S3ViM3JuM3Qzcy1UckBpbmluZyE=
# 3. Secrets are base64-ENCODED, not ENCRYPTED — anyone with API access can decode them
# 4. In production, enable encryption at rest and restrict access via RBAC
# 5. Never commit real Secrets to Git — this is for training purposes only!
