# kind-config.yaml — canonical lab cluster profile for this course
#
# Use from the repository root:
#   kind create cluster --name training --config kind-config.yaml
#
# This baseline intentionally includes:
# - a pinned kindest/node tag for reproducible labs
# - 3 nodes for scheduling and RBAC exercises
# - ingress-ready node label plus host port mappings for local HTTP/HTTPS demos
#
# NetworkPolicy enforcement is NOT part of the baseline.
# Module 5 adds Calico explicitly when NetworkPolicy enforcement is required.

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  image: kindest/node:v1.35.1
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    protocol: TCP
  - containerPort: 443
    hostPort: 443
    protocol: TCP
- role: worker
  image: kindest/node:v1.35.1
- role: worker
  image: kindest/node:v1.35.1
